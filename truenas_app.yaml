services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres          # change this (no @s)
      POSTGRES_DB: ritter
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: boon00/ritter:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3080:80"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db/ritter  # match POSTGRES_PASSWORD above
      RECEIPT_IMAGE_PATH: /app/images/receipts
      PROFILE_PICTURE_PATH: /app/images/profiles
      SECRET_KEY: changeme                 # change this to a long random string
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: changeme             # change this
      TZ: Europe/Berlin             
      OCR_PROVIDER=veryfi
      VERYFI_CLIENT_ID=
      VERYFI_CLIENT_SECRET=
      VERYFI_USERNAME=
      VERYFI_API_KEY=
    volumes:
      - images:/app/images

volumes:
  db_data:
  images:
